<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Неканон</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:20px;
      background:linear-gradient(135deg,#0f0f23 0%,#2d1b69 50%,#ba2f2f 100%);color:#fff;min-height:100vh;
      display:flex;align-items:flex-start;justify-content:center}
    .container{width:100%;max-width:980px}
    #header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    #stats{display:flex;gap:12px;align-items:center}
    .stat{background:rgba(255,255,255,0.06);padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);font-size:0.95rem}
    #cocktailWrap{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    #titleRow{display:flex;align-items:center;gap:12px}
    #cocktailName{font-size:clamp(1.6rem,5.5vw,2.4rem);text-align:left;margin:0 0 6px 0;text-shadow:0 4px 8px rgba(0,0,0,.5)}
    #nextBtn{background:rgba(255,255,255,0.08);color:#fff;border:2px solid rgba(255,255,255,0.18);border-radius:12px;padding:10px 14px;font-size:1rem;cursor:pointer;transition:all .18s}
    #nextBtn:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.32)}
    #options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:900px;width:100%}
    button.option{background:rgba(255,255,255,0.08);color:#fff;border:2px solid rgba(255,255,255,0.18);
      border-radius:12px;padding:14px;font-size:1rem;cursor:pointer;transition:all .18s;backdrop-filter:blur(6px)}
    button.option:hover:not(:disabled){transform:translateY(-3px);border-color:rgba(255,255,255,0.32)}
    button.correct{background:#4ade80;border-color:#22c55e;color:#054e3b}
    button.wrong{background:#f87171;border-color:#ef4444;color:#5f0d0d}
    button:disabled{cursor:default;opacity:0.98}
    .small{font-size:0.9rem;opacity:0.9}
    @media(max-width:600px){#options{grid-template-columns:repeat(2,1fr);gap:10px}}
  </style>
</head>
<body>
  <div class="container">
    <div id="header">
      <div id="stats">
        <div class="stat" id="statPerfect">Без ошибок: 0</div>
        <div class="stat" id="statCorrect">Правильных выборов: 0</div>
        <div class="stat" id="statWrong">Неправильных: 0</div>
      </div>
    </div>
    <div id="cocktailWrap">
      <div id="titleRow">
        <h1 id="cocktailName">чёт сломалось(</h1>
        <button id="nextBtn">некст</button>
      </div>
      <div>
        <div class="small" id="ingredientsCount"></div>
      </div>
    </div>
    <div id="options"></div>
  </div>
  <script>
    // Hardcoded база коктейлей — редактируйте здесь (название и массив ингредиентов)
    const cocktails = [
      { name: "Nuka Cola", ingredients: ["амаретто", "вишневый ликер", "лаймовый сок", "ванилин", "кола"] },
      { name: "Красный Халк🌶️", ingredients: ["кампари", "черносмородиновый ликёр", "мартини фиеро", "лимонный сок", "сахар"] },
      { name: "Алая ведьма", ingredients: ["джин", "биттер ангостура", "сироп ежевика", "лимонный сок", "яичный белок"] },
      { name: "Зелёный Фонарь", ingredients: ["виски", "бренди", "сироп блю кюрасао", "сироп эстрагон", "апельсиновый сок", "лимонный сок", "слайс яблока"] },
      { name: "Геральт из Ривии", ingredients: ["джин", "персиковый ликёр", "сироп маракуйя", "ананасовый сок", "персиковый сок", "лимонный сок"] },
      { name: "Курс зельеварения", ingredients: ["текила", "джин", "апельсиновый ликер", "лаймовый сок", "малиновый сироп", "имбирный эль"] },
      { name: "Ярость варвара", ingredients: ["джин", "ликёр юдзу", "лаймовый сок", "кордиал clavis юдзу бамбук лемонграсс", "грейпфрутовый сок", "лайм"] },
      { name: "Железный человек", ingredients: ["виски", "сироп клюква", "яблочный сок", "лимонный сок", "слайс апельсина"] },
      { name: "Капитан Америка", ingredients: ["водка", "джин ", "апельсиновый ликёр", "сироп блю кюрасао", "лимонад лимон-лайм", "лимонный сок"] },
      { name: "Зимний солдат", ingredients: ["белый ром", "грейпфрутовая водка", "апельсиновый ликёр", "джин", "малиновый сироп", "лимонный сок", "биттер-лемон"] },
      { name: "Тор", ingredients: ["белый ром", "текила", "сироп ежевика", "сироп гренадин", "апельсиновый сок", "лимонный сок", "маршмеллоу"] },
      { name: "Локи", ingredients: ["белый ром", "текила", "сироп блю кюрасао", "сироп эстрагон", "апельсиновый сок", "лимонный сок"] },
      { name: "Дэдпул🌶️", ingredients: ["водка", "биттер ангостура", "томатный сок", "лимонный сок", "табаско", "соль", "чёрный перец", "лимон", "маслины"] },
      { name: "Лунный Рыцарь", ingredients: ["martini extra dry", "серебряная текила", "сахарный сироп", "лимонный сок"] },
      { name: "Мистерио", ingredients: ["белый ром", "вишнёвый ликёр", "апельсиновый ликёр", "сироп блю кюрасао", "сироп эстрагон", "лимонад лимон-лайм", "лимонный сок"] },
      { name: "Удивительный Человек-Паук", ingredients: ["водка грейпфрут", "ликёр блю кюрасао", "сироп блю кюрасао", "лимонный сок", "яблочный сок", "индиан тоник", "слайс грейпфрута"] },
      { name: "Анти-Веном", ingredients: ["золотой ром", "банановый ликёр", "сливки", "банановый сироп", "шоколадный топинг"] },
      { name: "Алая ведьма", ingredients: ["джин", "биттер ангостура", "сироп ежевика", "лимонный сок", "яичный белок"] },
      { name: "Блэйд", ingredients: ["джин", "апельсиновый ликёр", "сироп клубника", "биттер-лемон", "лимонный сок"] },
      { name: "Мёртвый бассейн", ingredients: ["водка чёрная смородина", "кампари", "сироп чёрная смородина", "морс клюквенный", "биттер-лемон", "лимонный сок"] },
      { name: "Гамора", ingredients: ["грейпфрутовая водка", "дынный ликёр", "ликёр sour apple", "имбирный эль", "лимонный сок", "сахарный сироп", "слайс яблока"] },
      { name: "Ракета", ingredients: ["виски", "ликёр cherry brandy", "амаретто"] },
      { name: "Тёмный рыцарь", ingredients: ["белый ром", "джин", "апельсиновый ликёр", "сироп блю кюрасао", "ананасовый сок", "лимонный сок"] },
      { name: "Харли Квинн", ingredients: ["белый ром", "лимонный сок", "малиновый ликёр", "кокосовый ликёр"] },
      { name: "Джокер", ingredients: ["джин", "апельсиновый ликёр", "сироп блю кюрасао", "лимонад лимон-лайм", "лимонный сок", "слайс лайма"] },
      { name: "Король Акул", ingredients: ["белый ром", "джин", "ликёр личи", "сироп блю кюрасао", "сироп чёрная смородина", "лимонный сок", "индиан тоник", "мармелад"] },
      { name: "Флэш", ingredients: ["красный вермут", "кампари", "сироп чёрная смородина", "сироп гренадин", "грейпфрутовый сок", "лимонный сок", "слайс апельсина"] },
      { name: "Бэтмен", ingredients: ["водка", "кофейный ликёр", "эспрессо", "сироп карамель"] },
      { name: "Болотная Тварь", ingredients: ["абсент", "лимонный сок", "сироп карамель"] },
      { name: "Красный колпак 🌶️", ingredients: ["ликёр tundra", "ежевичный сироп", "биттер-лемон", "лимонный сок", "табаско"] },
      { name: "Шазам", ingredients: ["белый ром", "дынный ликёр", "сироп яблоко", "ананасовый сок", "вишнёвый сок с яблоком и черноплодкой"] },
      { name: "Весемир", ingredients: ["джин", "ликёр bols“maraschino”", "яблочный сироп", "лимонный сок", "индиан тоник"] },
      { name: "Ламберт, Ламберт...", ingredients: ["портвейн “osborn fine ruby”", "джин", "черносмородиновый ликёр", "сироп чёрная смородина", "лимонный сок", "яичный белок"] },
      { name: "Лютик", ingredients: ["дистиллят мандарин", "ликёр блю кюрасао", "клюквенная водка", "сироп бабл-гам", "лимонад лимон-лайм"] },
      { name: "Солнце Нильфгаарда", ingredients: ["джин", "ликёр бузина", "martini bianco", "кордиал clavis шисо земляника лемонграсс", "сок лайма", "лимонад ананас - личи"] },
      { name: "Цирилла", ingredients: ["ликёр tundra", "клюквенная водка", "биттер ангостура", "сироп гренадин", "сироп чёрная смородина", "вишнёвый сок с яблоком и черноплодкой", "яблочный сок", "лимонный сок", "маршмеллоу"] },
      { name: "Йеннифер из Венгерберга", ingredients: ["ликёр tundra", "ликёр блю кюрасао", "ликёр фиалка", "лимонад лимон-лайм", "лимонный сок"] },
      { name: "Мутаген", ingredients: ["дынный ликёр", "банановый ликёр", "фисташковый сироп", "лимонный сок"] },
      { name: "Ведьмаку заплатите...", ingredients: ["дистиллят мандарин", "апельсиновый ликёр", "дынный сироп", "сироп бабл-гам", "лимонный сок", "персиковый сок", "биттер-лемон"] },
      { name: "Контракт на Бруксу", ingredients: ["настойка кислое яблоко", "клубничный ликёр", "ликёр личи", "лимонный сок"] },
      { name: "Голубое молоко с Татуина", ingredients: ["джин", "амаретто", "ликёр блю кюрасао", "миндальное молоко", "сливки", "сахарный сироп", "ванилин"] },
      { name: "Тёмная сторона с печенькой", ingredients: ["белый ром", "клубничный ликёр", "кокосовый ликёр", "ананасовый сок", "лимонный сок", "печенье oreo"] },
      { name: "Минерва Макгонагалл", ingredients: ["просекко", "мартини фиеро", "ликер аперитиво", "гранатовый сок", "лаймовый сок", "мармелад"] },
      { name: "Алкогольное Сливочное Пиво", ingredients: ["золотой ром", "амаретто", "сливочная карамель", "газированная вода", "взбитые сливки", "корица", "мускатный орех"] },
      { name: "Гриффиндор", ingredients: ["тёмный ром", "сироп гренадин", "ананасовый сок", "персиковый сок", "лимонный сок"] },
      { name: "Слизерин", ingredients: ["белый ром", "абсент", "апельсиновый сок"] },
      { name: "Хаффлпафф", ingredients: ["белый ром", "дынный ликёр", "сироп чёрный лес", "персиковый сок", "лимонный сок", "биттер-лемон"] },
      { name: "Рейвенкло", ingredients: ["белый ром", "амаретто", "сироп блю кюрасао", "ананасовый сок"] },
      { name: "Северус", ingredients: ["самбука", "джин", "биттер ангостура", "биттер-лемон", "лимонный сок"] },
      { name: "Чёрная метка", ingredients: ["jägermeister", "черносмородиновая водка", "ликёр cherry brandy", "вишнёвый сироп", "лимонный сок", "яблочный сок", "биттер-лемон"] },
      { name: "Долорес Амбридж", ingredients: ["бренди", "смородиновый ликёр", "сироп чёрная смородина", "сливки"] },
      { name: "Омут Памяти", ingredients: ["водка", "martini bianco", "биттер ангостура"] },
      { name: "Авада Кедавра", ingredients: ["водка", "martini extra dry", "банановый ликёр"] },
      { name: "Грозный Глаз Грюм", ingredients: ["кордиал clavis голубика васильки черёмуха", "индиан тоник", "сахарный сироп", "лимонный сок", "мармелад"] }
    ];
    // Собираем все уникальные ингредиенты для distractors
    const allIngredients = [...new Set(cocktails.flatMap(c => c.ingredients))];
    let currentCocktail = null;
    let currentCorrect = [];
    let correctClicked = 0;
    let hadAnyWrongThisRound = false;
    // Статистика
    const stats = {
      perfectAnswers: 0, // ответ без единой ошибки
      correctSelections: 0,
      wrongSelections: 0
    };
    function updateStatsUI() {
      document.getElementById('statPerfect').textContent = `Без ошибок: ${stats.perfectAnswers}`;
      document.getElementById('statCorrect').textContent = `Правильных выборов: ${stats.correctSelections}`;
      document.getElementById('statWrong').textContent = `Неправильных: ${stats.wrongSelections}`;
    }
    function shuffle(arr) {
      return arr
        .map(v => ({ v, r: Math.random() }))
        .sort((a, b) => a.r - b.r)
        .map(o => o.v);
    }
    function getRandomWrongs(count) {
      const pool = allIngredients.filter(i => !currentCorrect.includes(i));
      return shuffle(pool).slice(0, Math.max(0, count));
    }
    function renderQuestion() {
      // pick random cocktail
      currentCocktail = cocktails[Math.floor(Math.random() * cocktails.length)];
      currentCorrect = [...currentCocktail.ingredients];
      correctClicked = 0;
      hadAnyWrongThisRound = false;
      // prepare options (keep total 16 or less)
      const totalOptions = 16;
      const neededWrongs = Math.max(0, totalOptions - currentCorrect.length);
      const wrongs = getRandomWrongs(neededWrongs);
      let options = [...currentCorrect, ...wrongs];
      options = shuffle(options);
      // render
      const nameEl = document.getElementById('cocktailName');
      if (nameEl) nameEl.textContent = currentCocktail.name;
      const countEl = document.getElementById('ingredientsCount');
      if (countEl) countEl.textContent = `Правильных ингредиентов: ${currentCorrect.length}`;
      const opts = document.getElementById('options');
      opts.innerHTML = '';
      options.forEach(ing => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = ing;
        btn.addEventListener('click', () => onSelect(btn, ing));
        opts.appendChild(btn);
      });
    }
    function revealAnswers() {
      document.querySelectorAll('#options button').forEach(b => {
        const text = b.textContent;
        if (currentCorrect.includes(text)) b.classList.add('correct');
        else b.classList.add('wrong');
        b.disabled = true;
      });
    }
    function onSelect(btn, ingredient) {
      if (btn.disabled) return;
      btn.disabled = true;
      if (currentCorrect.includes(ingredient)) {
        btn.classList.add('correct');
        correctClicked++;
        stats.correctSelections++;
        // if user selected all correct ones — mark round complete but DO NOT auto-advance
        if (correctClicked === currentCorrect.length) {
          // mark perfect if no wrongs clicked this round
          if (!hadAnyWrongThisRound) stats.perfectAnswers++;
          // disable all buttons and reveal wrongs as well
          document.querySelectorAll('#options button').forEach(b => {
            const text = b.textContent;
            if (currentCorrect.includes(text)) b.classList.add('correct');
            else b.classList.add('wrong');
            b.disabled = true;
          });
          updateStatsUI();
          // Do NOT automatically go to next question — user must click Next
        } else {
          updateStatsUI();
        }
      } else {
        btn.classList.add('wrong');
        hadAnyWrongThisRound = true;
        stats.wrongSelections++;
        updateStatsUI();
      }
    }
    // controls
    window.addEventListener('load', () => {
      try {
        renderQuestion();
        updateStatsUI();
        const next = document.getElementById('nextBtn');
        if (next) next.addEventListener('click', () => {
          renderQuestion();
        });
      } catch (err) {
        const nameEl = document.getElementById('cocktailName');
        if (nameEl) nameEl.textContent = 'Ошибка загрузки';
        console.error(err);
      }
    });
  </script>
</body>
</html>
